services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5178}:5178"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 5178
      STATIC_DIR: /app/static
    volumes:
      - downloads:/app/backend/downloads
    shm_size: "2gb"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5178/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  downloads:
